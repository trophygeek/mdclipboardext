version: 2
updates:
  # Maintain dependencies for Node.js (npm/pnpm/yarn)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "dependabot"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
